version: "3.9"

services:
  agent:
    build: ./agent
    restart: unless-stopped
    ports:
      - "11112:11112"
    volumes:
      - ./data/received:/data/received
      - ./data/quarantine:/data/quarantine
    env_file:
      - ./agent/.env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       dicom_archive
      POSTGRES_USER:     dicom
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dicom -d dicom_archive"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
